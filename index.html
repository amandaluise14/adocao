<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Adoção</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

        <h3>Cadastro Adoção</h3>
        <form action="" id="formulario">

            <label for="Nome">Nome completo:</label>
            <input type="text" id="nome" placeholder="Nome">
            <div id="erroNome" class="erro"></div><br>

            <label for="Email">Email:</label>
            <input type="email" id="email" placeholder="Email">
            <div id="erroEmail" class="erro"></div><br>

            <label for="Telefone">Telefone:</label>
            <input type="text" id="telefone" placeholder="Telefone">
            <div id="erroTelefone" class="erro"></div><br>

            <label for="Cpf">CPF:</label>
            <input type="text" id="cpf" placeholder="CPF">
            <div id="erroCpf" class="erro"></div><br>

            <label for="Idade">Idade:</label>
            <input type="number" id="idade" placeholder="Idade">
            <div id="erroIdade" class="erro"></div><br>

            <label for="Cidade">Cidade:</label>
            <input type="text" id="cidade" placeholder="Cidade">
            <div id="erroCidade" class="erro"></div><br>

            <label for="Moradia">Moradia:</label>
            <select id="moradia">
                <option value="">Selecione</option>
                <option value="casa">Casa</option>
                <option value="ap">Apartamento</option>
            </select><br><br>

            <label for="Quintal">Sua moradia tem quintal:</label>
                <input type="radio" id="quintal" placeholder="Sim">Sim
                <input type="radio" id="quintal" placeholder="Não">Não
            <div id="erroQuintal" class="erro"></div><br>

            <label for= "seguro">Quintal é seguro?</label>
                <select id="quintalSeguro">
                    <option value="">Selecione</option>
                    <option value="sim">Sim</option>
                    <option value="nao">Não</option>
                </select><br><br>

            <label for= "permite">Apartamento permite animais?</label>
                <select id="permiteAnimais">
                    <option value="">Selecione</option>
                    <option value="sim">Sim</option>
                    <option value="nao">Não</option>
                </select><br><br>

            <label for="Antes">Já teve pet antes?:</label>
            <select id="antes">
               <option value="">Selecione</option>
               <option value="sim">Sim</option>
               <option value="nao">Não</option>
            </select><br><br>

            <label for="Horas">Quantas horas você consegue ficar com o seu pet?</label>
            <input type="time" id="horas" placeholder="Horas">
            <div id="erroHoras" class="erro"></div><br>

            <label for="Financeiro">Condições financeiras:</label>
                <select id="financeiro">
                    <option value="">Selecione</option>
                    <option value="sim">Tenho</option>
                    <option value="nao">Não tenho</option>
                </select><br><br>

            <label for="Decisao">Quando decidiu adotar?</label>
                <select id="decisao">
                    <option value="">Selecione</option>
                    <option value="hoje">Hoje</option>
                    <option value="mais_tempo">Já faz um tempo</option>
                </select><br><br>

            <label for="motivo">Motivo da adoção</label><br>
            <textarea id="motivo"></textarea><br><br>

            <label for="Termo">Aceito o termo de responsabilidade:</label>
                <input type="checkbox" id="termo">
            <div id="erroTermo" class="erro"></div><br>

            <button type="submit">Enviar</button>
        </form>

        <div class = "resultado" id="resultado"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
